<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astrio</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  background: #0f0f0f;
  color: white;
  font-family: sans-serif;
}

/* TOP BAR */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
  background: rgba(0,0,0,0.6);
}

.title {
  font-size: 18px;
}

/* BUTTONS */
.icon-btn, .nav-btn {
  background: none;
  border: none;
}

svg {
  width: 24px;
  height: 24px;
  stroke: white;
}

/* BIG CREATE */
.create-btn svg {
  width: 36px;
  height: 36px;
}

/* AUTH */
.auth-box {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 40px;
}

input {
  padding: 12px;
  background: #1a1a1a;
  border: none;
  color: white;
}

/* BUTTONS (NO TEXT) */
.main-btn {
  height: 45px;
  border: none;
  background: linear-gradient(45deg,#00f3ff,#ff00ff);
}

/* SCREENS */
.screen { display: none; }
.screen.active { display: block; }

/* BOTTOM NAV */
.bottom-nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  padding: 10px;
  background: rgba(0,0,0,0.8);
}
</style>
</head>

<body>

<!-- TOP -->
<header class="top-bar">
  <div class="title">Discover</div>

  <div>
    <button class="icon-btn">
      <!-- AI ICON -->
      <svg fill="none" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19 12h2M3 12H5M12 19v2M12 3v2"/>
      </svg>
    </button>

    <button class="icon-btn">
      <!-- BELL -->
      <svg fill="none" stroke-width="2" viewBox="0 0 24 24">
        <path d="M15 17h5l-1.5-1.5A2 2 0 0118 14v-3a6 6 0 10-12 0v3c0 .5-.2 1-.5 1.5L4 17h5"/>
      </svg>
    </button>
  </div>
</header>

<!-- AUTH -->
<section id="auth-screen" class="screen active">
  <div class="auth-box">
    <input id="email" placeholder="Email">
    <input id="password" placeholder="Password">

    <button id="login-btn" class="main-btn"></button>
    <button id="signup-btn" class="main-btn"></button>
  </div>
</section>

<!-- FEED -->
<section id="feed-screen" class="screen"></section>

<!-- NAV -->
<nav class="bottom-nav">

  <button class="nav-btn">
    <!-- HOME -->
    <svg fill="none" stroke-width="2" viewBox="0 0 24 24">
      <path d="M3 10l9-7 9 7v10a1 1 0 01-1 1h-5v-6h-6v6H4a1 1 0 01-1-1z"/>
    </svg>
  </button>

  <button class="nav-btn">
    <!-- MARKET -->
    <svg fill="none" stroke-width="2" viewBox="0 0 24 24">
      <path d="M6 6h15l-1.5 9h-13z"/>
    </svg>
  </button>

  <button class="nav-btn create-btn">
    <!-- PLUS -->
    <svg fill="none" stroke-width="2" viewBox="0 0 24 24">
      <path d="M12 5v14M5 12h14"/>
    </svg>
  </button>

  <button class="nav-btn">
    <!-- CHAT -->
    <svg fill="none" stroke-width="2" viewBox="0 0 24 24">
      <path d="M21 15a4 4 0 01-4 4H7l-4 4V7a4 4 0 014-4h10a4 4 0 014 4z"/>
    </svg>
  </button>

  <button class="nav-btn">
    <!-- PROFILE -->
    <svg fill="none" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="12" cy="7" r="4"/>
      <path d="M5.5 21a6.5 6.5 0 0113 0"/>
    </svg>
  </button>

</nav>

<script src="js/app.js"></script>
<script src="js/auth.js"></script>

</body>
      </html>
