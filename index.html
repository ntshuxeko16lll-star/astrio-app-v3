
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astrio</title>

<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<!-- TOP BAR -->
<header class="top-bar">
  <div class="title">Discover</div>

  <div class="top-actions">
    <button id="ai-btn" class="icon-btn">
      <img src="assets/icons/ai.svg">
    </button>

    <button id="notif-btn" class="icon-btn">
      <img src="assets/icons/bell.svg">
    </button>
  </div>
</header>

<!-- AUTH SCREEN -->
<section id="auth-screen" class="screen active">
  <div class="auth-box">

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button id="login-btn" class="main-btn"></button>
    <button id="signup-btn" class="main-btn outline"></button>

  </div>
</section>

<!-- FEED (hidden until login) -->
<section id="feed-screen" class="screen"></section>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">

  <button class="nav-btn">
    <img src="assets/icons/home.svg">
  </button>

  <button class="nav-btn">
    <img src="assets/icons/market.svg">
  </button>

  <button class="nav-btn create-btn">
    <img src="assets/icons/create.svg">
  </button>

  <button class="nav-btn">
    <img src="assets/icons/chat.svg">
  </button>

  <button class="nav-btn">
    <img src="assets/icons/profile.svg">
  </button>

</nav>

<script src="js/app.js"></script>
<script src="js/auth.js"></script>

</body>
  </html>
